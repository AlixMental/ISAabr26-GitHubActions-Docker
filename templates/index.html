<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | {{ nombre }}</title>
    <style>
        /* Importamos una fuente moderna desde Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        /* Reseteo básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Fondo oscuro con degradado moderno */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor principal con efecto de cristal (Glassmorphism) */
        .tarjeta-perfil {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 100px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            /* Animación de entrada */
            animation: aparecer 1.2s ease-out;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            /* Texto con degradado azul/celeste */
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #d1d8e0;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Botones / Etiquetas de habilidades */
        .habilidades {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .etiqueta {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* Efecto al pasar el mouse sobre las etiquetas */
        .etiqueta:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            cursor: default;
        }

        /* Definición de la animación */
        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="tarjeta-perfil">
        <!-- Las variables inyectadas desde Python -->
        <h1>{{ nombre }}</h1>
        <h2>{{ rol }}</h2>
        
        <!-- Detalles extra para que se vea más completo -->
        <div class="habilidades">
            <span class="etiqueta">💻 Desarrollo Web</span>
            <span class="etiqueta">🧊 Renderizado 3D</span>
        </div>
    </div>

</body>
</html>
